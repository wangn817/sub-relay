services:
  sub-relay:
    build: .
    container_name: sub-relay
    network_mode: host
    environment:
      SUB_URLS: |
        https://example.com/sub/your-subscription
        # http://example.com/sub/another
      PROTOCOLS: "auto"
      # 0 means apply once and keep container alive. Example periodic refresh: 3600
      REFRESH_SECONDS: "0"
    restart: unless-stopped
